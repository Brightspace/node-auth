name: build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - uses: Brightspace/third-party-actions@actions/checkout

      - uses: Brightspace/setup-node@main
        with:
          node-version: ${{ matrix.node }}

      - run: npm install
      - run: npm test

  publish:
    if: github.ref_type == 'tag'
    needs: test

    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: Brightspace/third-party-actions@actions/checkout

      - uses: Brightspace/setup-node@main
        with:
          node-version: 24

      - run: npm install
      - run: |
          npm config set '//registry.npmjs.org/:_authToken=${NPM_TOKEN}'
          ./bin/do-release.sh
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
